server:
  port: 8080

spring:
  application:
    name: scamshield-ai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

scamshield:
  cors:
    allowed-origins: ${SCAMSHIELD_ALLOWED_ORIGINS:http://localhost:5173}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:45}

logging:
  level:
    com.scamshield: INFO
