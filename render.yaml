services:
  - type: web
    name: scamshield-ai-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"
      - key: SCAMSHIELD_ALLOWED_ORIGINS
        sync: false
